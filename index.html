<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웆ㅜ 업보리스트</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-deco deco-1">✦</div>
  <div class="bg-deco deco-2">♡</div>
  <div class="bg-deco deco-3">✧</div>

  <main class="wrap">
    <section class="hero">
      <div class="badge">WOJ-U UPBO LIST</div>
      <h1>🌸 웆ㅜ 업보리스트 🌸</h1>
      <p>친근하고 편한 동네 친구처럼, 오늘의 업보를 말랑하게 확인해요.</p>
    </section>

    <section class="panel">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="닉네임 검색하기" autocomplete="off" />
        <button id="reloadBtn" type="button">새로고침</button>
      </div>
      <p id="status" class="status">불러오는 중...</p>
      <div id="list" class="list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
